<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>haiku</title>
<style>
body{font-family:system-ui,sans-serif;display:grid;place-items:center;min-height:100vh;margin:0;background:#1a1a2e;color:#e0e0e0}
pre{font-size:1.5rem;line-height:2;text-align:center;padding:2rem;border:1px solid #555;border-radius:8px;background:#16213e}
</style>
</head>
<body>
<pre id="haiku"></pre>
<script>
fetch('haiku.txt').then(r=>r.text()).then(t=>document.getElementById('haiku').textContent=t)
</script>
</body>
</html>
